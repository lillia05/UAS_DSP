{% extends "base.html" %}

{% block title %}Prediksi AI - Grade Kopi{% endblock %}

{% block content %}
    <div class="card" style="max-width: 850px; margin: 0 auto;">
        <h1 style="text-align: center; margin-bottom: 32px; color: #5c4033;">Prediksi Grade Kopi Arabika</h1>
        
        <form method="POST" action="/predict">
            <div class="form-grid">
                
                <div class="form-group" style="grid-column: span 2; border-bottom: 2px solid #e6d7c3; padding-bottom: 5px; margin-bottom: 10px;">
                    <h3 style="color: #8b5a2b; margin: 0;">1. Data Fisik & Geografis</h3>
                </div>

                <div class="form-group">
                    <label>Negara Asal (Kode: 0-35):</label>
                    <input type="number" name="country" required class="form-control" placeholder="Contoh: 13 (Indonesia)">
                </div>

                <div class="form-group">
                    <label>Metode Proses:</label>
                    <select name="processing" class="form-control">
                        <option value="1">Washed / Wet</option>
                        <option value="0">Natural / Dry</option>
                        <option value="2">Semi-Washed / Pulped Natural</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ketinggian Tanam (mdpl):</label>
                    <input type="number" step="any" name="altitude" required class="form-control" placeholder="Contoh: 1500">
                </div>

                <div class="form-group">
                    <label>Kadar Air / Moisture (0.00 - 0.20):</label>
                    <input type="number" step="any" name="moisture" required class="form-control" placeholder="Contoh: 0.11">
                </div>

                <div class="form-group">
                    <label>Jumlah Cacat Primer (Cat 1 Defects):</label>
                    <input type="number" name="cat_one" required class="form-control" placeholder="Contoh: 0">
                </div>

                <div class="form-group">
                    <label>Jumlah Cacat Sekunder (Cat 2 Defects):</label>
                    <input type="number" name="cat_two" required class="form-control" placeholder="Contoh: 2">
                </div>

                <div class="form-group" style="grid-column: span 2; border-bottom: 2px solid #e6d7c3; padding-bottom: 5px; margin-bottom: 10px; margin-top: 10px;">
                    <h3 style="color: #8b5a2b; margin: 0;">2. Evaluasi Sensorik / Cupping (Skala 0 - 10)</h3>
                </div>

                <div class="form-group">
                    <label>Aroma:</label>
                    <input type="number" step="any" name="aroma" required class="form-control" placeholder="Contoh: 8.5">
                </div>

                <div class="form-group">
                    <label>Flavor (Rasa Utama):</label>
                    <input type="number" step="any" name="flavor" required class="form-control" placeholder="Contoh: 8.2">
                </div>

                <div class="form-group">
                    <label>Aftertaste (Jejak Rasa):</label>
                    <input type="number" step="any" name="aftertaste" required class="form-control" placeholder="Contoh: 8.0">
                </div>

                <div class="form-group">
                    <label>Acidity (Keasaman):</label>
                    <input type="number" step="any" name="acidity" required class="form-control" placeholder="Contoh: 8.3">
                </div>

                <div class="form-group">
                    <label>Body (Kekentalan):</label>
                    <input type="number" step="any" name="body" required class="form-control" placeholder="Contoh: 8.1">
                </div>

                <div class="form-group">
                    <label>Balance (Keseimbangan):</label>
                    <input type="number" step="any" name="balance" required class="form-control" placeholder="Contoh: 8.4">
                </div>

            </div>

            <button type="submit" class="btn-predict" style="margin-top: 25px; padding: 15px; font-size: 18px; background-color: #5c4033; color: white; width: 100%; border: none; border-radius: 5px; cursor: pointer;">
                ☕ Analisis Kualitas Kopi
            </button>
        </form>

        {% if prediction %}
            <div class="result-box" style="text-align: center; margin-top: 35px; border: 2px dashed #8b5a2b; padding: 20px; border-radius: 10px; background-color: #f9f6f0;">
                <h3 style="margin-top: 0; color: #5c4033;">Hasil Evaluasi AI:</h3>
                <h1 style="font-size: 28px; margin: 10px 0; color: #d35400;">{{ prediction }}</h1>
            </div>
        {% endif %}
    </div>
{% endblock %}
