<!DOCTYPE html> 
<html lang="id"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistem Analitik Kopi Arabika{% endblock %}</title> 
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f4f9f4; /* Putih sedikit kehijauan biar bersih */
            color: #333; 
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Navbar Warna Cokelat Kopi (Coffee Brown) */
        nav { 
            background-color: #5c4033; /* Warna diubah jadi cokelat kopi */
            padding: 15px 0; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        nav ul { list-style-type: none; margin: 0; padding: 0; text-align: center; }
        nav ul li { display: inline; margin: 0 20px; }
        nav ul li a { 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 16px;
            letter-spacing: 1px;
            transition: color 0.3s; 
        }
        nav ul li a:hover { color: #d4c5b0; }
        
        main { padding: 30px 0; }
        
        .card {
            background-color: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            margin-bottom: 20px;
        }
        h1, h2 { color: #5c4033; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { 
            width: 100%; padding: 10px; border: 1px solid #ccc; 
            border-radius: 4px; box-sizing: border-box; font-size: 15px;
        }
        .form-control:focus { 
            border-color: #8b5a2b; outline: none; box-shadow: 0 0 5px rgba(139, 90, 43, 0.3);
        }
        
        /* Tombol Cokelat Kopi */
        .btn-predict {
            background-color: #5c4033; color: white; padding: 12px 20px; 
            border: none; cursor: pointer; border-radius: 4px; 
            font-weight: bold; width: 100%; font-size: 16px; transition: background-color 0.3s; 
            margin-top: 10px;
        }
        .btn-predict:hover { background-color: #3e2b22; }
        
        .result-box {
            margin-top: 30px; padding: 20px; background-color: #f9f6f0; 
            border-left: 5px solid #8b5a2b; border-radius: 4px; color: #5c4033;
        }
        .dashboard-container {
            width: 100%; height: 900px; border: 2px solid #5c4033; 
            border-radius: 8px; overflow: hidden; margin-top: 20px;
        }
    </style>
</head> 
<body> 
    <nav> 
        <ul> 
            <li><a href="/dashboard">📊 Dashboard Analisis Kopi</a></li> 
            <li><a href="/predict">☕ Prediksi Grade Kopi</a></li> 
        </ul> 
    </nav> 
    <main class="container"> 
        {% block content %}{% endblock %} 
    </main> 
</body> 
</html>
